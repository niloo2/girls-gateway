<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afghan Women's Digital Gateway</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <nav>
        <div class="logo">🕊️ Afghan<span>Gateway</span></div>
        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#programs">Programs</a></li>
          <li><a href="#contact">Contact</a></li>
          <li>
            <a href="#donate" class="nav-donate-btn"
              ><i class="fas fa-heart"></i> Donate</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <!-- hero -->
    <section id="home" class="hero">
      <div class="slideshow">
        <div
          class="slide"
          style="background-image: url('images/pic1.jpg')"
        ></div>
        <div
          class="slide"
          style="background-image: url('images/pic2.jpg')"
        ></div>
        <div
          class="slide"
          style="background-image: url('images/pic3.jpg')"
        ></div>
        <div
          class="slide"
          style="background-image: url('images/pic4.jpg')"
        ></div>
      </div>

      <div class="hero-overlay"></div>

      <div class="hero-content">
        <h1>Empowering Afghan Women <span>Through Education</span></h1>
        <p>
          Discover free online learning and remote work opportunities — safely
          and anonymously.
        </p>
        <div class="cta-buttons">
          <a href="#programs" class="btn btn-primary"
            ><i class="fas fa-graduation-cap"></i> Explore Programs</a
          >
        </div>
      </div>
    </section>
  </body>
</html>
